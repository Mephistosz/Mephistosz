name: Profile stats

on:
  schedule:
    - cron: "0 6 * * *"
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-profile-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate GitHub stats card
        uses: stn1slv/github-stats-card@v1.1.4
        with:
          card-type: user-stats
          username: ${{ github.repository_owner }}
          token: ${{ secrets.GITHUB_TOKEN }}
          output: assets/stats.svg
          theme: tokyonight
          show-icons: true
          include-all-commits: true
          hide-border: false

      - name: Generate language stats card
        uses: stn1slv/github-stats-card@v1.1.4
        with:
          card-type: top-langs
          username: ${{ github.repository_owner }}
          token: ${{ secrets.GITHUB_TOKEN }}
          output: assets/languages.svg
          theme: tokyonight
          layout: compact
          langs-count: 8
          hide-border: false

      - name: Commit generated cards
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add assets/stats.svg assets/languages.svg
          git diff --staged --quiet || git commit -m "chore: update profile stats cards [skip ci]"
          git push
