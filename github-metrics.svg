<svg xmlns="http://www.w3.org/2000/svg" width="900" height="240" viewBox="0 0 900 240" role="img" aria-labelledby="title desc">
  <title id="title">Felipe Gomes GitHub Metrics</title>
  <desc id="desc">A local fallback metrics card for the Mephistosz GitHub profile.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10101a" />
      <stop offset="55%" stop-color="#151529" />
      <stop offset="100%" stop-color="#21162f" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7aa2f7" />
      <stop offset="50%" stop-color="#bb9af7" />
      <stop offset="100%" stop-color="#f7768e" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="900" height="240" rx="22" fill="url(#bg)" />
  <rect x="1" y="1" width="898" height="238" rx="21" fill="none" stroke="#30344f" />
  <rect x="30" y="32" width="840" height="4" rx="2" fill="url(#accent)" filter="url(#glow)" />

  <circle cx="54" cy="68" r="7" fill="#f7768e" />
  <circle cx="78" cy="68" r="7" fill="#e0af68" />
  <circle cx="102" cy="68" r="7" fill="#9ece6a" />

  <text x="40" y="112" fill="#c0caf5" font-family="Consolas, Monaco, monospace" font-size="24" font-weight="700">mephistosz@github:~$ metrics</text>
  <text x="40" y="150" fill="#a9b1d6" font-family="Consolas, Monaco, monospace" font-size="18">Java • Spring Boot • REST APIs • Databases • Git</text>
  <text x="40" y="185" fill="#7dcfff" font-family="Consolas, Monaco, monospace" font-size="16">Dynamic GitHub metrics will be generated here by GitHub Actions.</text>
  <text x="40" y="212" fill="#565f89" font-family="Consolas, Monaco, monospace" font-size="14">Reliable local fallback: no broken external stats cards.</text>

  <text x="650" y="154" fill="#bb9af7" font-family="Consolas, Monaco, monospace" font-size="64" font-weight="700" opacity="0.85">&lt;/&gt;</text>
</svg>
