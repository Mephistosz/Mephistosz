<svg xmlns="http://www.w3.org/2000/svg" width="920" height="340" viewBox="0 0 920 340" role="img" aria-labelledby="title desc">
  <title id="title">Felipe Gomes backend terminal card</title>
  <desc id="desc">A dark terminal-style profile card for Felipe Gomes, focused on Java, Spring Boot, APIs, and backend development.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#090a12" />
      <stop offset="52%" stop-color="#111427" />
      <stop offset="100%" stop-color="#21142e" />
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7aa2f7" />
      <stop offset="48%" stop-color="#bb9af7" />
      <stop offset="100%" stop-color="#f7768e" />
    </linearGradient>

    <radialGradient id="orb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#bb9af7" stop-opacity="0.9" />
      <stop offset="55%" stop-color="#7aa2f7" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#7aa2f7" stop-opacity="0" />
    </radialGradient>

    <filter id="soft-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <style>
      .mono { font-family: Consolas, Monaco, 'Courier New', monospace; }
      .sans { font-family: Inter, Segoe UI, Arial, sans-serif; }
      .muted { fill: #787c99; }
      .text { fill: #c0caf5; }
      .blue { fill: #7dcfff; }
      .green { fill: #9ece6a; }
      .yellow { fill: #e0af68; }
      .pink { fill: #f7768e; }
      .purple { fill: #bb9af7; }
    </style>
  </defs>

  <rect width="920" height="340" rx="26" fill="url(#bg)" />
  <rect x="1" y="1" width="918" height="338" rx="25" fill="none" stroke="#2f344d" />

  <circle cx="760" cy="84" r="145" fill="url(#orb)" opacity="0.75" />
  <path d="M690 250 C742 220, 786 235, 850 194" fill="none" stroke="#bb9af7" stroke-width="2" opacity="0.22" />
  <path d="M675 278 C742 240, 805 268, 884 214" fill="none" stroke="#7dcfff" stroke-width="2" opacity="0.18" />

  <rect x="34" y="30" width="852" height="280" rx="18" fill="#0d0f1a" opacity="0.92" stroke="#252a42" />
  <rect x="34" y="30" width="852" height="42" rx="18" fill="#14172a" />
  <path d="M34 55 H886" stroke="#252a42" />

  <circle cx="62" cy="51" r="6" fill="#f7768e" />
  <circle cx="84" cy="51" r="6" fill="#e0af68" />
  <circle cx="106" cy="51" r="6" fill="#9ece6a" />
  <text x="132" y="56" class="mono muted" font-size="14">mephistosz@github:~/backend</text>

  <text x="62" y="112" class="mono green" font-size="18">$ whoami</text>
  <text x="62" y="148" class="sans text" font-size="31" font-weight="700">Felipe Gomes</text>
  <text x="62" y="178" class="sans blue" font-size="18" font-weight="600">Backend Developer | Java &amp; Spring Boot</text>
  <text x="62" y="211" class="sans muted" font-size="15">Clean APIs, service layers, database-backed systems, and maintainable backend code.</text>

  <rect x="62" y="235" width="116" height="34" rx="17" fill="#151a2e" stroke="#303852" />
  <text x="86" y="257" class="sans yellow" font-size="13" font-weight="700">Java</text>

  <rect x="190" y="235" width="154" height="34" rx="17" fill="#151a2e" stroke="#303852" />
  <text x="215" y="257" class="sans green" font-size="13" font-weight="700">Spring Boot</text>

  <rect x="356" y="235" width="124" height="34" rx="17" fill="#151a2e" stroke="#303852" />
  <text x="382" y="257" class="sans blue" font-size="13" font-weight="700">REST APIs</text>

  <rect x="492" y="235" width="134" height="34" rx="17" fill="#151a2e" stroke="#303852" />
  <text x="519" y="257" class="sans purple" font-size="13" font-weight="700">Databases</text>

  <g transform="translate(690 112)">
    <text x="0" y="0" class="mono purple" font-size="60" font-weight="700">&lt;/&gt;</text>
    <text x="0" y="38" class="mono muted" font-size="14">build --reliable</text>
    <rect x="2" y="56" width="122" height="8" rx="4" fill="#252a42" />
    <rect x="2" y="56" width="88" height="8" rx="4" fill="url(#accent)" filter="url(#soft-glow)" />
    <text x="0" y="94" class="mono green" font-size="14">status: learning</text>
    <text x="0" y="119" class="mono blue" font-size="14">mode: backend</text>
  </g>

  <rect x="34" y="306" width="852" height="4" rx="2" fill="url(#accent)" opacity="0.95" />
</svg>
