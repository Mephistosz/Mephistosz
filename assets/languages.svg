<svg width="467" height="115" viewBox="0 0 467 115"
     fill="none" xmlns="http://www.w3.org/2000/svg"
     role="img" aria-labelledby="titleId descId">
  <title id="titleId">Most Used Languages</title>
  <desc id="descId">Most Used Languages statistics</desc>
  
    <style>
      .header {
        font: 600 18px 'Segoe UI', Ubuntu, Sans-Serif;
        fill: #70a5fd;
      }
      .stat {
        font: 600 14px 'Segoe UI', Ubuntu, 'Helvetica Neue', Sans-Serif;
        fill: #38bdae;
      }
      .stat.bold {
        font-weight: 700;
      }
      .not_bold {
        font-weight: 400;
      }
      .icon {
        fill: #bf91f3;
        display: block;
      }
      .rank-text {
        font: 800 24px 'Segoe UI', Ubuntu, Sans-Serif;
        fill: #38bdae;
        animation: scaleInAnimation 0.3s ease-in-out forwards;
      }
      .rank-circle-rim {
        stroke: #70a5fd;
        fill: none;
        stroke-width: 6;
        opacity: 0.2;
      }
      .rank-circle {
        stroke: #70a5fd;
        stroke-dasharray: 250;
        fill: none;
        stroke-width: 6;
        stroke-linecap: round;
        opacity: 0.8;
        transform-origin: -10px 8px;
        transform: rotate(-90deg);
      }
      @keyframes scaleInAnimation {
        from {
          transform: translate(-5px, 5px) scale(0);
        }
        to {
          transform: translate(-5px, 5px) scale(1);
        }
      }
      
        .stagger {
          opacity: 0;
          animation: fadeInAnimation 0.3s ease-in-out forwards;
        }
        @keyframes fadeInAnimation {
          from {
            opacity: 0;
          }
          to {
            opacity: 1;
          }
        }
        @media (prefers-reduced-motion: reduce) {
          .stagger {
            animation: none;
            opacity: 1;
          }
          .rank-text {
            animation: none;
          }
        }
        
    </style>
    

  <defs>
    
  </defs>

  <rect
    x="0.5"
    y="0.5"
    rx="4.5"
    height="114"
    stroke="#e4e2e2"
    width="466"
    fill="#1a1b27"
    stroke-opacity="1"
  />

  
    <g transform="translate(25, 35)">
      <text class="header">Most Used Languages</text>
    </g>
    

  <g transform="translate(0, 55)">
    <style>
    .lang-name {
      font: 400 14px "Segoe UI", Ubuntu, Sans-Serif;
      fill: #38bdae;
    }
    
    .stagger {
      opacity: 0;
      animation: fadeInAnimation 0.3s ease-in-out forwards;
    }
    .lang-progress {
      animation: growWidthAnimation 0.6s ease-in-out forwards;
    }
    @keyframes growWidthAnimation {
      from { width: 0; }
      to { width: 100%; }
    }
    @keyframes fadeInAnimation {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    </style>
<svg data-testid="lang-items" x="25">
    

      <mask id="rect-mask">
          <rect x="0" y="0" width="417" height="8" fill="white" rx="5"/>
        </mask>
        
        <rect
          mask="url(#rect-mask)"
          data-testid="lang-progress"
          x="0.0"
          y="0"
          width="417.0"
          height="8"
          fill="#f1e05a"
        />
      
      
    <g transform="translate(0, 25)">
      <g transform="translate(0, 0)"><g transform="translate(0, 0)">
    <g class="stagger" style="animation-delay: 450ms">
      <circle cx="5" cy="6" r="5" fill="#f1e05a" />
      <text data-testid="lang-name" x="15" y="10" class='lang-name'>
        JavaScript
      </text>
      <text x="180" y="10" class='lang-name' text-anchor="end">
        100.0%
      </text>
    </g>
  </g></g><g transform="translate(225, 0)"></g>
    </g>
  </svg>
  </g>
</svg>