<svg xmlns="http://www.w3.org/2000/svg" width="467" height="195" viewBox="0 0 467 195" role="img" aria-labelledby="title desc">
  <title id="title">Felipe Gomes GitHub stats placeholder</title>
  <desc id="desc">A local placeholder card that will be replaced by generated GitHub statistics.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117" />
      <stop offset="100%" stop-color="#151a2e" />
    </linearGradient>
  </defs>
  <rect width="467" height="195" rx="14" fill="url(#bg)" />
  <rect x="0.5" y="0.5" width="466" height="194" rx="13.5" fill="none" stroke="#30363d" />
  <text x="24" y="45" font-family="Consolas, Monaco, monospace" font-size="18" font-weight="700" fill="#7aa2f7">GitHub Stats</text>
  <text x="24" y="84" font-family="Consolas, Monaco, monospace" font-size="14" fill="#c0caf5">Generated card will appear here.</text>
  <text x="24" y="116" font-family="Consolas, Monaco, monospace" font-size="13" fill="#787c99">Action: stn1slv/github-stats-card</text>
  <text x="24" y="148" font-family="Consolas, Monaco, monospace" font-size="13" fill="#9ece6a">Stable local SVG, no public stats endpoint.</text>
</svg>
